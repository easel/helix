slug: helix-brief
min_duration_s: 10
min_assistant_chars: 200

expect:
  - kind: prompt
    contains_all:
      - "HELIX to frame"
      - "healthcare claims"
  - kind: tool_call
    name: Skill
    args_contain:
      skill: "helix"
  - kind: tool_call
    name: Write
    args_contain:
      file_path: "docs/helix/01-frame/vision/VISION.md"
  - kind: tool_call
    name: Write
    args_contain:
      file_path: "docs/helix/01-frame/prd/PRD-001"
  - kind: tool_call
    name: Write
    args_contain:
      file_path: "docs/helix/01-frame/features/FEAT-001"
  - kind: tool_call
    name: Write
    args_contain:
      file_path: "US-001"
  - kind: assistant
    contains: "authority order"
