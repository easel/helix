slug: helix-evolve
min_duration_s: 10
min_assistant_chars: 200

expect:
  - kind: narration
    contains: "OAuth"
  - kind: prompt
    contains: "helix-evolve"
  - kind: tool_call
    name: Glob
    args_contain:
      pattern: "docs/helix"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: "docs/helix/01-frame/prd.md"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: "security-architecture"
  - kind: assistant
    contains: "Impact analysis"
  - kind: output
    contains_all:
      - "step 1"
      - "step 6"
      - "bead-OAUTH"
  - kind: narration
    contains: "authority hierarchy"
