slug: helix-execute
min_duration_s: 7
min_assistant_chars: 150

expect:
  - kind: narration
    contains: "bounded implementation pass"
  - kind: prompt
    contains_all:
      - "HELIX build mode"
      - "bead-001"
  - kind: tool_call
    contains: "helix"
  - kind: tool_call
    contains_all:
      - "Read"
      - "beads.jsonl"
  - kind: tool_call
    contains: "FEAT-001-csv-ingest.md"
  - kind: tool_call
    contains: "schema-mapping.yaml"
  - kind: tool_call
    contains: "header_sniffer_test.go"
  - kind: tool_call
    contains: "go test"
  - kind: assistant
    contains_all:
      - "Acceptance"
      - "OWASP A03"
      - "3 fixtures"
      - "Scope held to bead-001"
