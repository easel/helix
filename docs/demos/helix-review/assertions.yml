slug: helix-review
min_duration_s: 7
min_assistant_chars: 150

expect:
  - kind: narration
    contains: "fresh-eyes"
  - kind: tool_call
    name: Skill
    args_contain:
      skill: "helix"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: ".ddx/beads.jsonl"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: "security-architecture"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: "src/auth/refresh.ts"
  - kind: tool_call
    name: Read
    args_contain:
      file_path: "tests/auth/refresh_test.ts"
  - kind: assistant
    contains: "Review findings"
  - kind: output
    contains_all:
      - "revocation"
      - "CRITICAL"
