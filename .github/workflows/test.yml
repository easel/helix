name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ddx
        run: curl -fsSL https://raw.githubusercontent.com/DocumentDrivenDX/ddx/main/install.sh | bash
        env:
          DDX_INSTALL_DIR: /usr/local/bin

      - name: Configure git identity
        run: |
          git config --global user.email "ci@helix.dev"
          git config --global user.name "HELIX CI"

      - name: Validate Pages demo recording
        run: bash tests/validate-pages-demo-recording.sh

      - name: Validate deploy artifact graph
        run: bash tests/validate-deploy-artifacts.sh

      - name: Validate state detection rules
        run: bash tests/validate-state-rules.sh

      - name: Validate skill packages
        run: bash tests/validate-skills.sh
