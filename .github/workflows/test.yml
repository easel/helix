name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run CLI tests
        run: bash tests/helix-cli.sh

      - name: Validate skill packages
        run: bash tests/validate-skills.sh
