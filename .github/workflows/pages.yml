name: Deploy Website to GitHub Pages

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      HUGO_VERSION: "0.159.2"
    steps:
      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install DDx
        run: curl -fsSL https://raw.githubusercontent.com/DocumentDrivenDX/ddx/main/install.sh | bash
        env:
          DDX_INSTALL_DIR: /usr/local/bin

      - name: Install demo dependencies
        run: pipx install asciinema

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config --global user.name "HELIX CI"
          git config --global user.email "ci@helix.dev"
          git config --global init.defaultBranch main

      - name: Record demos (virtual agent — no API keys)
        run: |
          export DEMO_HARNESS=virtual
          export DEMO_MODEL=claude-haiku-4-5-20251001
          export DEMO_PACE=5
          export HELIX_ROOT="${GITHUB_WORKSPACE}"
          export PATH="${HOME}/.local/bin:${GITHUB_WORKSPACE}/scripts:$PATH"
          for demo in quickstart concerns evolve experiment; do
            echo "::group::Recording $demo"
            dir=$(mktemp -d)
            cast="website/static/demos/helix-${demo}.cast"
            if (cd "$dir" && asciinema rec \
              --cols 100 --rows 30 \
              --command "HELIX_DEMO_RECORDING=1 bash ${GITHUB_WORKSPACE}/docs/demos/helix-${demo}/demo.sh" \
              "/tmp/helix-${demo}.cast" 2>&1); then
              cp -f "/tmp/helix-${demo}.cast" "$cast"
              echo "✓ $demo recorded ($(wc -c < "$cast") bytes)"
            else
              echo "::warning::$demo demo failed — keeping committed .cast file"
            fi
            echo "::endgroup::"
          done

      - name: Generate concerns catalog
        run: bash website/scripts/generate-concerns.sh

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        working-directory: website
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/New_York
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
