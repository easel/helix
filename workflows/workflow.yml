# DDx plugin metadata stub — DDx-coupled by nature.
# This file is a registry entry consumed by the DDx plugin loader.
# It is NOT a runtime-neutral HELIX artifact; it describes where DDx finds
# the normative workflow contract inside its plugin tree.
#
# Runtime-neutral state definitions live in:
#   workflows/state-machine.yaml  — phase graph and gate conditions
#   workflows/state-rules.yml     — artifact patterns and state-detection rules
#
# DDx plugin normative contract lives in:
# - .ddx/plugins/helix/workflows/README.md
# - .ddx/plugins/helix/workflows/EXECUTION.md
# - .ddx/plugins/helix/workflows/TRACKER.md
# - .ddx/plugins/helix/workflows/actions/*.md bounded action prompts

name: helix
version: 2.0.0
description: Metadata summary for the HELIX workflow (DDx plugin registry entry)
author: DDX Team
created: 2025-01-13
tags:
  - test-driven-development
  - tracker
  - bounded-execution

phases:
  - id: discover
    order: 0
    name: Discover
    description: Optional opportunity validation before Frame.
    contract_docs:
      - .ddx/plugins/helix/workflows/phases/00-discover/README.md
      - .ddx/plugins/helix/workflows/phases/00-discover/GATE.yaml

  - id: frame
    order: 1
    name: Frame
    description: Define the problem, requirements, and acceptance criteria.
    contract_docs:
      - .ddx/plugins/helix/workflows/phases/01-frame/README.md
      - .ddx/plugins/helix/workflows/phases/01-frame/GATE.yaml

  - id: design
    order: 2
    name: Design
    description: Define architecture, contracts, and technical designs.
    contract_docs:
      - .ddx/plugins/helix/workflows/phases/02-design/README.md
      - .ddx/plugins/helix/workflows/phases/02-design/GATE.yaml

  - id: test
    order: 3
    name: Test
    description: Write failing tests that define system behavior.
    contract_docs:
      - .ddx/plugins/helix/workflows/phases/03-test/README.md
      - .ddx/plugins/helix/workflows/phases/03-test/GATE.yaml

  - id: build
    order: 4
    name: Build
    description: Implement the minimum changes needed to satisfy tests.
    contract_docs:
      - .ddx/plugins/helix/workflows/phases/04-build/README.md
      - .ddx/plugins/helix/workflows/phases/04-build/GATE.yaml
      - .ddx/plugins/helix/workflows/actions/implementation.md

  - id: deploy
    order: 5
    name: Deploy
    description: Release safely with monitoring and rollback readiness.
    contract_docs:
      - .ddx/plugins/helix/workflows/phases/05-deploy/README.md
      - .ddx/plugins/helix/workflows/phases/05-deploy/GATE.yaml

  - id: iterate
    order: 6
    name: Iterate
    description: Capture learnings, backlog follow-up work, and review outputs.
    contract_docs:
      - .ddx/plugins/helix/workflows/phases/06-iterate/README.md
      - .ddx/plugins/helix/workflows/phases/06-iterate/GATE.yaml
      - .ddx/plugins/helix/workflows/actions/check.md
      - .ddx/plugins/helix/workflows/actions/reconcile-alignment.md
      - .ddx/plugins/helix/workflows/actions/backfill-helix-docs.md
