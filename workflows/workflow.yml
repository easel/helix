# Metadata stub only.
# The normative HELIX contract lives in:
# - workflows/helix/README.md
# - workflows/helix/EXECUTION.md
# - workflows/helix/BEADS.md
# - workflows/helix/actions/*.md bounded action prompts

name: helix
version: 2.0.0
description: Metadata summary for the HELIX workflow
author: DDX Team
created: 2025-01-13
tags:
  - test-driven-development
  - beads
  - bounded-execution

phases:
  - id: discover
    order: 0
    name: Discover
    description: Optional opportunity validation before Frame.
    contract_docs:
      - workflows/helix/phases/00-discover/README.md
      - workflows/helix/phases/00-discover/GATE.yaml

  - id: frame
    order: 1
    name: Frame
    description: Define the problem, requirements, and acceptance criteria.
    contract_docs:
      - workflows/helix/phases/01-frame/README.md
      - workflows/helix/phases/01-frame/GATE.yaml

  - id: design
    order: 2
    name: Design
    description: Define architecture, contracts, and technical designs.
    contract_docs:
      - workflows/helix/phases/02-design/README.md
      - workflows/helix/phases/02-design/GATE.yaml

  - id: test
    order: 3
    name: Test
    description: Write failing tests that define system behavior.
    contract_docs:
      - workflows/helix/phases/03-test/README.md
      - workflows/helix/phases/03-test/GATE.yaml

  - id: build
    order: 4
    name: Build
    description: Implement the minimum changes needed to satisfy tests.
    contract_docs:
      - workflows/helix/phases/04-build/README.md
      - workflows/helix/phases/04-build/GATE.yaml
      - workflows/helix/actions/implementation.md

  - id: deploy
    order: 5
    name: Deploy
    description: Release safely with monitoring and rollback readiness.
    contract_docs:
      - workflows/helix/phases/05-deploy/README.md
      - workflows/helix/phases/05-deploy/GATE.yaml

  - id: iterate
    order: 6
    name: Iterate
    description: Capture learnings, backlog follow-up work, and review outputs.
    contract_docs:
      - workflows/helix/phases/06-iterate/README.md
      - workflows/helix/phases/06-iterate/GATE.yaml
      - workflows/helix/actions/check.md
      - workflows/helix/actions/reconcile-alignment.md
      - workflows/helix/actions/backfill-helix-docs.md
