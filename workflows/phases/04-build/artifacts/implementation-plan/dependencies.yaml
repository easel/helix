# Implementation Plan Dependencies
artifact:
  name: Implementation Plan
  id: implementation-plan
  type: document
  phase: build

description: |
  Scopes the implementation work that will satisfy the test plan and
  follow the technical design. Decomposes work into bounded units that
  the autopilot can execute one bead at a time.

dependencies:
  requires:
    - input: Test Plan
      type: artifact
      phase: "03-test"
      path: test-plan
      required: true
      relationship: "implementation makes the tests pass"
    - input: Technical Design
      type: artifact
      phase: "02-design"
      path: technical-design
      required: true
      relationship: "follows the technical design"
    - input: Test Suites
      type: artifact
      phase: "03-test"
      path: test-suites
      required: false
      relationship: "failing tests to make pass"
  enables: []

output:
  location: docs/helix/04-build/implementation-plan.md
  format: markdown

validation:
  required_sections:
    - work_decomposition
    - sequencing
    - acceptance_mapping

  quality_checks:
    - check: tests_passing
      description: All referenced tests pass after implementation completes
      severity: blocking
    - check: coverage_threshold
      description: Code coverage meets the project minimum (default 80%)
      severity: blocking
    - check: implementation_matches_design
      description: Implementation matches the technical design without unscoped widening
      severity: blocking
    - check: code_review_completed
      description: Code review is recorded against the bead before merge
      severity: warning

relationships:
  informs:
    - test-suites
  referenced_by:
    - runbook
    - release-notes

tags:
  - build
  - implementation
