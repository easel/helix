artifact:
  name: Test Suites
  id: test-suites
  type: document
  phase: test

description: |
  Organized set of executable or manual test suites grouped by scope,
  ownership, runtime, and evidence expectations.

output:
  location: docs/helix/03-test/test-suites.md
  format: markdown
  naming: test-suites.md

validation:
  required_sections:
    - suite_inventory
    - coverage_mapping
    - execution_commands
    - ownership
    - evidence

  quality_checks:
    - check: suites_have_entrypoints
      description: Each suite should identify how it is executed or reviewed
      severity: blocking
    - check: coverage_traceable
      description: Suites should trace to requirements, stories, risks, or acceptance criteria
      severity: warning

prompts:
  generation: prompt.md

template:
  file: template.md

relationships:
  informed_by:
    - test-plan
    - test-procedures
    - security-tests
  informs:
    - deployment-checklist

tags:
  - test
  - suites
  - coverage

version: 1.0.0
