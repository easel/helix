# Test Plan Dependencies
artifact:
  name: Test Plan
  id: test-plan
  type: document
  phase: test

description: |
  Feature-scoped test plan. Defines test strategy, test cases, and
  coverage targets that validate the technical design and verify the
  user-story acceptance criteria.

dependencies:
  requires:
    - input: Technical Design
      type: artifact
      phase: "02-design"
      path: technical-design
      required: true
      relationship: "tests validate design"
    - input: User Stories
      type: artifact
      phase: "01-frame"
      path: user-stories
      required: true
      relationship: "tests verify acceptance criteria"
    - input: Security Requirements
      type: artifact
      phase: "01-frame"
      path: security-requirements
      required: false
      relationship: "informs security tests"
  enables:
    - output: Test Suites
      type: artifact
      path: test-suites
      relationship: "actual test implementation"

output:
  location: docs/helix/03-test/test-plans/TP-NNN-*.md
  format: markdown

validation:
  required_sections:
    - test_strategy
    - test_cases
    - coverage_targets

  quality_checks:
    - check: no_unresolved_markers
      description: No [TBD], [TODO], or [NEEDS CLARIFICATION] markers remain
      severity: blocking
    - check: all_ac_have_test_cases
      description: All acceptance criteria have at least one test case
      severity: blocking
    - check: edge_cases_covered
      description: Edge cases are covered, not just the happy path
      severity: warning

relationships:
  informs:
    - test-suites
    - implementation-plan
  referenced_by:
    - test-suites
    - implementation-plan
    - security-tests

tags:
  - test
  - feature-level
