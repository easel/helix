# Metadata for Story Test Plan (Story-Level)

artifact:
  name: Story Test Plan
  id: story-test-plan
  type: document
  phase: test
  level: story

id_format:
  prefix: TP
  pattern: "TP-[0-9]{3}"
  example: TP-011
  description: |
    Story test plans use the story's TP-XXX identifier. Each number is unique
    across the project and should align with the governing story slice.

description: |
  The story test plan translates one bounded technical design into executable
  verification intent before implementation starts. It maps story acceptance
  criteria to concrete failing tests, names the required setup and data, and
  gives Build a precise handoff for one story-sized slice.

output:
  location: docs/helix/03-test/test-plans/TP-{id}-{name}.md
  format: markdown
  naming: TP-{story-number}-{story-name}.md
  examples:
    - TP-002-helix-cli.md
    - TP-011-slider-autonomy.md

reuse_policy: |
  One story test plan per story slice. Update it in place as the technical
  design or acceptance criteria evolve; do not create parallel TP documents for
  the same story unless the story itself was decomposed into new bounded slices.

validation:
  required_sections:
    - story_reference
    - scope_and_objective
    - acceptance_criteria_mapping
    - executable_proof
    - data_and_setup
    - build_handoff

  pattern_checks:
    - pattern: "\\[\\[US-[0-9]{3}-"
      expected: ">=1"
      message: Must reference the governing user story

    - pattern: "\\[\\[TD-[0-9]{3}-"
      expected: ">=1"
      message: Must reference the governing technical design

    - pattern: "`[^`]+`"
      expected: ">=2"
      message: Must name concrete tests, commands, or fixtures rather than prose only

  quality_checks:
    - check: acceptance_traced
      description: Every active acceptance criterion maps to at least one concrete failing test
      severity: blocking

    - check: proof_is_executable
      description: The plan must name real commands, files, or test identifiers that can be run or created
      severity: blocking

    - check: setup_is_explicit
      description: Fixtures, seed data, mocks, or environment assumptions must be explicit
      severity: warning

    - check: scope_is_bounded
      description: The plan must stay story-scoped and call out out-of-scope coverage explicitly
      severity: blocking

prompts:
  generation: prompt.md
  review: |
    Review this story test plan for:
    1. Clear traceability from story acceptance criteria to failing tests
    2. Executable evidence paths (commands, files, test identifiers)
    3. Explicit setup, fixtures, and data dependencies
    4. Bounded story scope without feature-level drift
    5. Useful build handoff sequencing for implementation

template:
  file: template.md

workflow:
  creation_order: 2
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Technical Lead

relationships:
  informed_by:
    - user-story
    - technical-design
    - solution-design

  informs:
    - test-suites
    - implementation-plan

  referenced_by:
    - technical-design
    - implementation-plan

tags:
  - test
  - story-level
  - acceptance
  - traceability

version: 1.0.0
last_updated: 2026-04-09
