# Story Test Plan Dependencies
artifact:
  name: Story Test Plan
  id: story-test-plan
  type: document
  phase: test

description: |
  Story-scoped test plan that proves a single user story's acceptance
  criteria. Each accepted scenario maps to at least one executable test;
  the document hands the build phase a deterministic "make these tests
  pass" contract.

dependencies:
  requires:
    - input: Technical Design
      type: artifact
      phase: "02-design"
      path: technical-design
      required: true
      relationship: "story test plan validates the bounded technical design"
    - input: User Story
      type: artifact
      phase: "01-frame"
      path: user-stories
      required: true
      relationship: "story test plan proves the story's acceptance criteria"
    - input: Solution Design
      type: artifact
      phase: "02-design"
      path: solution-design
      required: false
      relationship: "feature-level constraints shape story test coverage"
  enables:
    - output: Test Suites
      type: artifact
      path: test-suites
      relationship: "maps each accepted scenario to executable tests"

output:
  location: docs/helix/03-test/test-plans/TP-NNN-*.md
  format: markdown

validation:
  required_sections:
    - acceptance_criteria_test_mapping
    - executable_proof
    - build_handoff

  quality_checks:
    - check: no_unresolved_markers
      description: No [TBD], [TODO], or [NEEDS CLARIFICATION] markers remain
      severity: blocking
    - check: every_ac_has_failing_test
      description: Every active acceptance criterion has at least one failing test path
      severity: blocking
    - check: setup_and_data_explicit
      description: Setup, data, and edge cases are explicit enough for an implementer to act on
      severity: blocking

relationships:
  informs:
    - test-suites
    - implementation-plan
  referenced_by:
    - test-suites
    - implementation-plan

tags:
  - test
  - story-level
  - tdd
