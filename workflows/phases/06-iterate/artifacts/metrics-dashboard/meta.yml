artifact:
  name: Metrics Dashboard
  id: metrics-dashboard
  type: document
  phase: iterate

description: |
  Iteration-level metrics summary that compares current values to a prior
  baseline and answers whether the latest change improved the system.

dependencies:
  requires:
    - input: Metric Definitions
      type: artifact
      path: metrics
      required: true
    - input: Measurement Results
      type: external
      required: true
    - input: Prior iteration learnings
      type: artifact
      path: feedback-analysis
      required: false
  enables:
    - output: Improvement Backlog
      type: artifact
      phase: iterate
    - output: Next Iteration Plan
      type: artifact
      phase: iterate

output:
  location: docs/helix/06-iterate/metrics-dashboard.md
  format: markdown
  naming: metrics-dashboard.md

validation:
  required_sections:
    - review_window
    - decision
    - summary
    - metrics_table
    - trend_notes
    - follow_up

  quality_checks:
    - check: baseline_defined
      description: Comparison baseline must be explicit
      severity: blocking
    - check: source_linked
      description: Every metric must cite its definition or measurement source
      severity: blocking
    - check: actionability_defined
      description: The summary must state what to do next
      severity: warning

prompts:
  generation: prompt.md

template:
  file: template.md

workflow:
  creation_order: 1
  review_cycles: 1
  approval_required: true
  approvers:
    - Technical Lead
    - Product Owner

relationships:
  informed_by:
    - metric-definition
    - feedback-analysis
    - lessons-learned
  informs:
    - improvement-backlog
    - next-iteration

tags:
  - iterate
  - metrics
  - dashboard
  - report

version: 1.0.0
last_updated: 2026-04-09
