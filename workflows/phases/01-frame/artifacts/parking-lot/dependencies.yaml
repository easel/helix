# Parking Lot Dependencies
artifact:
  name: Parking Lot
  id: parking-lot
  type: document
  phase: frame

description: |
  Tracks deferred and future work items without cluttering core HELIX
  artifacts. Each entry records the source, the reason for deferral, and
  the trigger that should bring it back into scope.

dependencies:
  requires:
    - input: PRD
      type: artifact
      phase: "01-frame"
      path: prd
      required: false
      relationship: "captures deferred items that arise during framing"
  enables: []

output:
  location: docs/helix/01-frame/parking-lot.md
  format: markdown

validation:
  required_sections:
    - purpose
    - policy
    - deferred_items

  quality_checks:
    - check: entries_have_source_and_trigger
      description: Each entry includes a Source and a Revisit Trigger
      severity: blocking

relationships:
  informs:
    - improvement-backlog
  referenced_by:
    - prd
    - improvement-backlog

tags:
  - frame
  - deferred
  - housekeeping
