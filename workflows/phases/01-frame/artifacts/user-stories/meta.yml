# Metadata for User Stories

artifact:
  name: User Stories
  id: user-stories
  type: collection
  phase: frame

description: |
  Standalone design artifacts defining vertical slices of the application.
  Each story traces a complete user journey from trigger to outcome with
  acceptance criteria concrete enough to drive test-first implementation.
  Stories are stable governing references — tracker issues reference them,
  not the other way around.

output:
  location: docs/helix/01-frame/user-stories/
  format: markdown
  naming: US-{number}-{slug}.md
  structure: one-per-story

validation:
  required_sections:
    - story
    - context
    - walkthrough
    - acceptance_criteria
    - edge_cases
    - test_scenarios
    - dependencies

  quality_checks:
    - check: persona_specific
      description: Story names a specific persona from the PRD
      severity: blocking

    - check: criteria_testable
      description: Every acceptance criterion is independently testable
      severity: blocking

    - check: test_scenarios_concrete
      description: Test scenarios include concrete values
      severity: blocking

    - check: walkthrough_complete
      description: Walkthrough traces a complete path from trigger to outcome
      severity: blocking

    - check: edge_cases_present
      description: At least one edge case documented
      severity: warning

  automated_checks:
    - pattern: "As a .* I want .* [Ss]o that"
      expected: ">0"
      message: Story must follow standard format

    - pattern: "Given .* [Ww]hen .* [Tt]hen"
      expected: ">0"
      message: Must include testable acceptance criteria

variables:
  - name: feature_id
    description: FEAT-XXX identifier for parent feature
    required: true

prompts:
  generation: prompt.md

template:
  file: template.md

workflow:
  creation_order: 3
  review_cycles: 1-2
  approval_required: true
  approvers:
    - Product Owner

relationships:
  derived_from:
    - prd
    - feature-specification
  informs:
    - solution-design
    - test-cases
    - tracker-issues

tracking:
  id_format: US-NNN
  id_scope: project

tags:
  - requirements
  - vertical-slice
  - design-artifact
