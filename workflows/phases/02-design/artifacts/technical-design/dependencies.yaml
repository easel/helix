# Technical Design Dependencies
artifact:
  name: Technical Design
  id: technical-design
  type: document
  phase: design

description: |
  Story-level implementation design. A TD specifies how a single story will
  be built — API changes, data model, security considerations — within the
  bounds of the governing architecture and solution design.

dependencies:
  requires:
    - input: User Story
      type: artifact
      phase: "01-frame"
      path: user-stories
      required: true
      relationship: "designs implementation for the story"
    - input: Architecture
      type: artifact
      phase: "02-design"
      path: architecture
      required: true
      relationship: "follows architectural patterns"
    - input: Solution Design
      type: artifact
      phase: "02-design"
      path: solution-design
      required: false
      relationship: "references feature-level design"
    - input: Feature Specification
      type: artifact
      phase: "01-frame"
      path: feature-specification
      required: false
      relationship: "implements feature requirements"
  enables:
    - output: Test Plan
      type: artifact
      phase: "03-test"
      path: test-plan
      relationship: "test plan validates the design"
    - output: Contract
      type: artifact
      path: contract
      relationship: "defines API contracts"

output:
  location: docs/helix/02-design/technical-designs/TD-NNN-*.md
  format: markdown

validation:
  required_sections:
    - api_changes
    - data_model
    - security_considerations

  quality_checks:
    - check: no_unresolved_markers
      description: No [TBD], [TODO], or [NEEDS CLARIFICATION] markers remain
      severity: blocking
    - check: acceptance_mapped
      description: Acceptance criteria are mapped to specific implementation steps
      severity: blocking
    - check: edge_cases_documented
      description: Edge cases and error paths are documented
      severity: warning

relationships:
  informs:
    - test-plan
    - contract
    - implementation-plan
  referenced_by:
    - test-plan
    - implementation-plan

tags:
  - design
  - story-level
  - implementation
