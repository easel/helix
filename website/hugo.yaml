baseURL: https://documentdrivendx.github.io/helix/
locale: en-us
title: HELIX — Supervised Autopilot for AI-Assisted Development

module:
  imports:
    - path: github.com/imfing/hextra

enableRobotsTXT: true
enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Why HELIX
      pageRef: /why
      weight: 1
    - name: Artifacts
      pageRef: /artifacts
      weight: 2
    - name: Concerns
      pageRef: /concerns
      weight: 3
    - name: Use HELIX
      pageRef: /use
      weight: 4
    - name: Reference
      pageRef: /reference
      weight: 5
    - name: GitHub
      url: https://github.com/easel/helix
      weight: 10
      params:
        icon: github

params:
  description: Supervised autopilot that advances the weakest ready layer of your development stack until human input is needed.

  navbar:
    displayTitle: true
    displayLogo: false

  page:
    width: wide

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: true
    base: https://github.com/easel/helix/edit/main/website/content
